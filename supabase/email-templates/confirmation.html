<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirm your Care Concierge account</title>
  </head>
  <body style="margin:0;background:#0D1117;font-family:Arial,Helvetica,sans-serif;color:#E6EDF3;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0D1117;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;background:#161B22;border:1px solid #30363D;border-radius:16px;overflow:hidden;">
            <tr><td style="padding:24px 28px;border-bottom:1px solid #30363D;"><div style="font-size:15px;font-weight:700;color:#E6EDF3;">Care <span style="color:#4DA6E8;">Concierge</span></div></td></tr>
            <tr>
              <td style="padding:30px 28px;">
                <h1 style="margin:0;font-size:24px;line-height:1.25;color:#E6EDF3;">Confirm your account</h1>
                <p style="margin:14px 0 0;font-size:15px;line-height:1.6;color:#8B949E;">Care Concierge is invite-only. If your administrator asked you to confirm this account, use the button below.</p>
                <table role="presentation" cellpadding="0" cellspacing="0" style="margin-top:22px;"><tr><td style="background:#1D6FA8;border-radius:12px;"><a href="{{ .ConfirmationURL }}" style="display:inline-block;color:#FFFFFF;text-decoration:none;font-size:15px;font-weight:700;padding:14px 18px;border-radius:12px;">Confirm account</a></td></tr></table>
                <p style="margin:20px 0 8px;font-size:12px;line-height:1.5;color:#6E7681;">Account: {{ .Email }}</p>
                <p style="margin:0;word-break:break-all;font-size:12px;line-height:1.55;color:#4DA6E8;">{{ .ConfirmationURL }}</p>
              </td>
            </tr>
            <tr><td style="padding:18px 28px;background:#0D1117;border-top:1px solid #30363D;"><p style="margin:0;font-size:12px;line-height:1.5;color:#6E7681;">If you did not request this, ignore this email.</p></td></tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
