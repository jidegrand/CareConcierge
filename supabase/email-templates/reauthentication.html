<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirm reauthentication</title>
  </head>
  <body style="margin:0;background:#0D1117;font-family:Arial,Helvetica,sans-serif;color:#E6EDF3;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0D1117;padding:32px 16px;">
      <tr><td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;background:#161B22;border:1px solid #30363D;border-radius:16px;overflow:hidden;">
          <tr><td style="padding:24px 28px;border-bottom:1px solid #30363D;"><div style="font-size:15px;font-weight:700;color:#E6EDF3;">Care <span style="color:#4DA6E8;">Concierge</span></div></td></tr>
          <tr><td style="padding:30px 28px;">
            <h1 style="margin:0;font-size:24px;line-height:1.25;color:#E6EDF3;">Confirm this security step</h1>
            <p style="margin:14px 0 0;font-size:15px;line-height:1.6;color:#8B949E;">Enter this code to continue with your sensitive Care Concierge account action.</p>
            <div style="margin-top:20px;padding:18px;background:#0D1117;border:1px solid #30363D;border-radius:12px;text-align:center;font-size:28px;letter-spacing:0.18em;font-weight:700;color:#E6EDF3;">{{ .Token }}</div>
            <p style="margin:20px 0 0;font-size:13px;line-height:1.55;color:#8B949E;">If you did not request this, you can ignore this email.</p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
